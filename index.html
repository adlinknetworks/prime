<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Domain</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding-top:18vh;
    background:#f5f5f5;

    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
}

.box{
    background:white;
    padding:60px 80px;
    border-radius:20px;
    box-shadow:0 20px 50px rgba(0,0,0,0.08);
    text-align:center;
}

.domain{
    font-size:72px;
    font-weight:800;
    color:#2d3748;
    letter-spacing:-1px;
}

.mail{
    display:block;
    margin-top:12px;
    font-size:14px;
    color:#888;
    text-decoration:none;
}

.mail:hover{
    text-decoration:underline;
}
</style>

</head>
<body>

<div class="box">
    <div class="domain" id="domain"></div>
    <a class="mail" href="mailto:info@wsv.net">info@wsv.net</a>
</div>

<script>
const domain = window.location.hostname.replace("www.","");
document.getElementById("domain").innerText = domain;
document.title = domain;
</script>

</body>
</html>
