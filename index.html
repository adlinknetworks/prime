<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Domain</title>

<link href="https://fonts.googleapis.com/css2?family=Open+Sans+Condensed:wght@700&family=Open+Sans:wght@300&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding-top:18vh;
    background:#f5f5f5;
}

.box{
    text-align:center;
}

.domain{
    font-family:'Open Sans Condensed', sans-serif;
    font-size:72px;
    font-weight:700;
    letter-spacing:1px;
    color:#222;
}

.mail{
    margin-top:10px;
    font-family:'Open Sans', sans-serif;
    font-size:14px;
    color:#888;
    font-weight:300;
}
</style>

</head>
<body>

<div class="box">
    <div class="domain" id="domain"></div>
    <div class="mail">info@wsv.net</div>
</div>

<script>
const domain = window.location.hostname.replace("www.","");
document.getElementById("domain").innerText = domain;
document.title = domain;
</script>

</body>
</html>
