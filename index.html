<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Domain</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f5f5f5;
    font-family:Arial, Helvetica, sans-serif;
}

.box{
    text-align:center;
}

.domain{
    font-size:64px;
    font-weight:700;
}

.mail{
    margin-top:10px;
    font-size:14px;
    color:#777;
}
</style>

</head>
<body>

<div class="box">
    <div class="domain" id="domain"></div>
    <div class="mail">info@wsv.net</div>
</div>

<script>
const domain = window.location.hostname.replace("www.","");
document.getElementById("domain").innerText = domain;
document.title = domain;
</script>

</body>
</html>
